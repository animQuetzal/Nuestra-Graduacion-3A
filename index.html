<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceremonia de Graduación</title>
    <style>
        /* RESETEO TOTAL */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000000; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .canvas-celular {
            max-width: 450px;
            width: 100%;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
        }

        .seccion {
            width: 100%;
            position: relative; 
            line-height: 0;
            font-size: 0;
            display: block;
        }

        .seccion img, .seccion video {
            width: 100%;
            height: auto;
            margin: 0;
            padding: 0;
            display: block;
            border: none;
        }

        /* =========================================
           1. DISEÑO DEL CONTADOR (REDUCIDO AL 70%)
           ========================================= */
        .contador-flotante {
            position: absolute;
            bottom: 16%; 
            left: 50%; /* Centrado perfecto */
            transform: translateX(-50%); /* Centrado perfecto */
            width: 65%; /* Reducido del 90% original */
            background: #FFFFFF; 
            border-radius: 10px; /* Bordes un poco más sutiles */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-around;
            padding: 10px 0; /* Menos padding */
            box-sizing: border-box;
            line-height: 1.2; 
        }

        .time-box {
            text-align: center;
        }

        .time-box span {
            display: block;
            color: #042a67; 
            font-size: 1.4rem; /* Reducido de 2rem */
            font-weight: bold;
            font-family: 'Arial', sans-serif;
        }

        .time-box label {
            color: #042a67; 
            font-size: 0.5rem; /* Reducido de 0.7rem */
            text-transform: uppercase;
            font-weight: bold;
            font-family: 'Arial', sans-serif;
        }

        /* =========================================
           2. BOTÓN DE UBICACIÓN (Para la sección 05)
           ========================================= */
        .btn-ubicacion {
            position: absolute;
            top: 38%; /* <<-- CAMBIA ESTE NÚMERO PARA SUBIRLO O BAJARLO */
            left: 50%;
            transform: translateX(-20%); /* Esto lo mantiene siempre al centro */
            background-color: #D4AF37; /* Dorado */
            color: #FFFFFF; /* Texto Blanco */
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 5;
            white-space: nowrap; /* Evita que el texto se rompa en dos líneas */
            line-height: 1.5; /* Restaura la altura de línea para el texto del botón */
        }

        /* =========================================
           3. DISEÑO DE LA LISTA DE ALUMNOS (SCROLL)
           ========================================= */
        .contenedor-scroll-alumnos {
            position: absolute;
            top: 15%;    
            bottom: 15%; 
            left: 10%;   
            right: 10%;  
            overflow-y: auto; 
            line-height: 1.5; 
            padding: 10px;
        }

        .contenedor-scroll-alumnos::-webkit-scrollbar {
            width: 4px;
        }
        .contenedor-scroll-alumnos::-webkit-scrollbar-thumb {
            background-color: rgba(4, 42, 103, 0.3);
            border-radius: 4px;
        }

        .alumno-item {
            text-align: center;
            margin-bottom: 20px;
            font-family: 'Arial', sans-serif;
        }

        .alumno-nombre {
            color: #042a67;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0;
        }

        .padrino-nombre {
            color: #555555;
            font-size: 0.9rem;
            margin: 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="canvas-celular">
        
        <div class="seccion">
            <video autoplay loop muted playsinline>
                <source src="portada.mp4" type="video/mp4">
            </video>
        </div>

        <div class="seccion">
            <img src="02_invitacion.png" alt="Detalles de Invitación" onerror="this.src='02_invitacion.jpg'">
            
            <div id="countdown" class="contador-flotante">
                <div class="time-box"><span id="days">00</span><label>Días</label></div>
                <div class="time-box"><span id="hours">00</span><label>Horas</label></div>
                <div class="time-box"><span id="minutes">00</span><label>Min</label></div>
                <div class="time-box"><span id="seconds">00</span><label>Seg</label></div>
            </div>
        </div>

        <div class="seccion">
            <img src="03_invitadosDeHonor.png" alt="Invitados de Honor" onerror="this.src='03_invitadosDeHonor.jpg'">
        </div>

        <div class="seccion">
            <img src="04_programa.png" alt="Programa del Evento" onerror="this.src='04_programa.jpg'">
        </div>

        <div class="seccion">
            <img src="05_recepcion.png" alt="Recepción" onerror="this.src='05_recepcion.jpg'">
            
            <a href="https://share.google/0f9iJmaEovQVdK2ZC" target="_blank" class="btn-ubicacion">
                📍 Ubicación
            </a>
        </div>

        <div class="seccion">
            <img src="06_fechas.png" alt="Fechas Importantes" onerror="this.src='06_fechas.jpg'">
        </div>

        <div class="seccion">
            <img src="07_alumnos.png" alt="Fondo Lista de Alumnos" onerror="this.src='07_alumnos.jpg'">
            
            <div class="contenedor-scroll-alumnos" id="caja-lista-alumnos">
                </div>
        </div>

    </div>

    <script>
        // CONTADOR
        const targetDate = new Date("July 16, 2026 10:00:00").getTime();
        const updateCountdown = setInterval(() => {
            const now = new Date().getTime();
            const difference = targetDate - now;

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            if (difference < 0) {
                clearInterval(updateCountdown);
                document.getElementById("countdown").innerHTML = "<p style='color:#042a67; font-weight:bold; font-size: 1.1rem; width:100%; text-align:center;'>¡HOY ES EL GRAN DÍA!</p>";
            }
        }, 1000);

        // LISTA DE ALUMNOS (SIMULADOR DE EXCEL)
        const listaAlumnosExcel = [
            { alumno: "Lorem Ipsum Dolor", padrino: "Padrino: Amet Consectetur" },
            { alumno: "Adipiscing Elit", padrino: "Padrino: Sed Do Eiusmod" },
            { alumno: "Tempor Incididunt", padrino: "Padrino: Ut Labore Et" },
            { alumno: "Dolore Magna Aliqua", padrino: "Padrino: Ut Enim Ad" },
            { alumno: "Minim Veniam", padrino: "Padrino: Quis Nostrud" },
            { alumno: "Exercitation Ullamco", padrino: "Padrino: Laboris Nisi" },
            { alumno: "Ut Aliquip Ex", padrino: "Padrino: Ea Commodo" },
            { alumno: "Consequat Duis Aute", padrino: "Padrino: Irure Dolor" },
            { alumno: "In Reprehenderit", padrino: "Padrino: In Voluptate" },
            { alumno: "Velit Esse Cillum", padrino: "Padrino: Dolore Eu" }
        ];

        const cajaAlumnos = document.getElementById("caja-lista-alumnos");
        listaAlumnosExcel.forEach(datos => {
            const itemHTML = `
                <div class="alumno-item">
                    <p class="alumno-nombre">${datos.alumno}</p>
                    <p class="padrino-nombre">${datos.padrino}</p>
                </div>
            `;
            cajaAlumnos.innerHTML += itemHTML;
        });
    </script>
</body>
</html>
