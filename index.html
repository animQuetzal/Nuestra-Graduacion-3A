<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceremonia de Graduación</title>
    <style>
        /* RESETEO TOTAL: Cero márgenes y ceros espacios para que todo sea continuo */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Fondo negro por si la pantalla es muy ancha */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LIENZO VIRTUAL: Tamaño fijo de celular al centro */
        .canvas-celular {
            max-width: 450px;
            width: 100%;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
        }

        /* SECCIONES: Esto elimina la línea blanca invisible entre imágenes */
        .seccion {
            width: 100%;
            position: relative; /* Necesario para que floten cosas encima */
            line-height: 0;
            font-size: 0;
            display: block;
        }

        /* LAS IMÁGENES Y VIDEO: Ajuste exacto a los bordes */
        .seccion img, .seccion video {
            width: 100%;
            height: auto;
            margin: 0;
            padding: 0;
            display: block;
            border: none;
        }

        /* =========================================
           DISEÑO DEL CONTADOR (Sobre 02_invitacion)
           ========================================= */
        .contador-flotante {
            position: absolute;
            bottom: 16%; /* Ajusta este número si quieres subirlo o bajarlo */
            left: 5%;
            width: 90%;
            background: #FFFFFF; /* Envolvente blanco solicitado */
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            box-sizing: border-box;
            line-height: 1.2; /* Regresamos la altura de línea normal para el texto */
        }

        .time-box {
            text-align: center;
        }

        .time-box span {
            display: block;
            color: #042a67; /* Azul especificado */
            font-size: 2rem;
            font-weight: bold;
            font-family: 'Arial', sans-serif;
        }

        .time-box label {
            color: #042a67; /* Azul especificado */
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
            font-family: 'Arial', sans-serif;
        }

        /* =========================================
           DISEÑO DE LA LISTA DE ALUMNOS (Sobre 07_alumnos)
           ========================================= */
        .contenedor-scroll-alumnos {
            position: absolute;
            top: 15%;    /* Margen superior interno respecto al borde de la imagen */
            bottom: 15%; /* Margen inferior para no tapar los adornos de abajo */
            left: 10%;   /* Margen izquierdo para no tapar el marco blanco */
            right: 10%;  /* Margen derecho */
            overflow-y: auto; /* Activa el deslizamiento vertical (scroll) */
            line-height: 1.5; /* Restablecemos el texto */
            padding: 10px;
        }

        /* Ocultar barra de scroll estéticamente pero permitir el tacto */
        .contenedor-scroll-alumnos::-webkit-scrollbar {
            width: 4px;
        }
        .contenedor-scroll-alumnos::-webkit-scrollbar-thumb {
            background-color: rgba(4, 42, 103, 0.3);
            border-radius: 4px;
        }

        .alumno-item {
            text-align: center;
            margin-bottom: 20px;
            font-family: 'Arial', sans-serif;
        }

        .alumno-nombre {
            color: #042a67;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0;
        }

        .padrino-nombre {
            color: #555555;
            font-size: 0.9rem;
            margin: 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="canvas-celular">
        
        <div class="seccion">
            <video autoplay loop muted playsinline>
                <source src="portada.mp4" type="video/mp4">
            </video>
        </div>

        <div class="seccion">
            <img src="02_invitacion.png" alt="Detalles de Invitación">
            
            <div id="countdown" class="contador-flotante">
                <div class="time-box"><span id="days">00</span><label>Días</label></div>
                <div class="time-box"><span id="hours">00</span><label>Horas</label></div>
                <div class="time-box"><span id="minutes">00</span><label>Min</label></div>
                <div class="time-box"><span id="seconds">00</span><label>Seg</label></div>
            </div>
        </div>

        <div class="seccion">
            <img src="03_invitadosDeHonor.png" alt="Invitados de Honor" onerror="this.src='03_invitadosDeHonor.jpg'">
        </div>

        <div class="seccion">
            <img src="04_programa.png" alt="Programa del Evento" onerror="this.src='04_programa.jpg'">
        </div>

        <div class="seccion">
            <img src="05_recepcion.png" alt="Recepción" onerror="this.src='05_recepcion.jpg'">
        </div>

        <div class="seccion">
            <img src="06_fechas.png" alt="Fechas Importantes" onerror="this.src='06_fechas.jpg'">
        </div>

        <div class="seccion">
            <img src="07_alumnos.png" alt="Fondo Lista de Alumnos">
            
            <div class="contenedor-scroll-alumnos" id="caja-lista-alumnos">
                </div>
        </div>

    </div>

    <script>
        // ==========================================
        // 1. CONFIGURACIÓN DEL CONTADOR DE TIEMPO
        // Tentativo: 16 de Julio de 2026 a las 10:00 AM
        // ==========================================
        const targetDate = new Date("July 16, 2026 10:00:00").getTime();
        const updateCountdown = setInterval(() => {
            const now = new Date().getTime();
            const difference = targetDate - now;

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            if (difference < 0) {
                clearInterval(updateCountdown);
                document.getElementById("countdown").innerHTML = "<p style='color:#042a67; font-weight:bold; font-size: 1.5rem; width:100%; text-align:center;'>¡HOY ES EL GRAN DÍA!</p>";
            }
        }, 1000);

        // ==========================================
        // 2. GENERADOR DE LISTA DE ALUMNOS (SIMULADOR DE EXCEL)
        // ==========================================
        // Cuando tengas la lista real en Excel, podemos hacer que lea un archivo .csv
        // Por ahora, solo reemplaza o copia estas líneas con los nombres reales.
        
        const listaAlumnosExcel = [
            { alumno: "Lorem Ipsum Dolor", padrino: "Padrino: Amet Consectetur" },
            { alumno: "Adipiscing Elit", padrino: "Padrino: Sed Do Eiusmod" },
            { alumno: "Tempor Incididunt", padrino: "Padrino: Ut Labore Et" },
            { alumno: "Dolore Magna Aliqua", padrino: "Padrino: Ut Enim Ad" },
            { alumno: "Minim Veniam", padrino: "Padrino: Quis Nostrud" },
            { alumno: "Exercitation Ullamco", padrino: "Padrino: Laboris Nisi" },
            { alumno: "Ut Aliquip Ex", padrino: "Padrino: Ea Commodo" },
            { alumno: "Consequat Duis Aute", padrino: "Padrino: Irure Dolor" },
            { alumno: "In Reprehenderit", padrino: "Padrino: In Voluptate" },
            { alumno: "Velit Esse Cillum", padrino: "Padrino: Dolore Eu" }
        ];

        // Esta función inyecta los nombres en el diseño visual de la caja
        const cajaAlumnos = document.getElementById("caja-lista-alumnos");
        
        listaAlumnosExcel.forEach(datos => {
            const itemHTML = `
                <div class="alumno-item">
                    <p class="alumno-nombre">${datos.alumno}</p>
                    <p class="padrino-nombre">${datos.padrino}</p>
                </div>
            `;
            cajaAlumnos.innerHTML += itemHTML;
        });
    </script>
</body>
</html>
